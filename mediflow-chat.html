<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediFlow  Care Companion</title>
<style>
  :root {
    --bg: #F6F4EF;
    --panel: #FFFFFF;
    --ink: #23302C;
    --ink-soft: #62726B;
    --teal: #285C55;
    --teal-deep: #1B3E39;
    --line: #E3DFD5;
    --high: #B4432F;
    --high-bg: #FBEAE6;
    --medium: #B9873A;
    --medium-bg: #FBF1E2;
    --user-bubble: #285C55;
    --agent-bubble: #FFFFFF;
    --radius: 14px;
    --input-bg: #24504A;
    --input-border: #3A6D66;
    --input-fg: #F6F4EF;
    --tool-tag-bg: #F1EFE8;
  }

  /* DARK MODE  toggled via data-theme="dark" on <html> */
  html[data-theme="dark"] {
    --bg: #14201C;
    --panel: #1C2924;
    --ink: #EAEFEA;
    --ink-soft: #A3B3AC;
    --teal: #4FA294;
    --teal-deep: #0E1815;
    --line: #2E3D37;
    --high: #E07A63;
    --high-bg: #3A241F;
    --medium: #E0B368;
    --medium-bg: #3A2F1C;
    --user-bubble: #2F6E63;
    --agent-bubble: #223029;
    --input-bg: #223029;
    --input-border: #35473F;
    --input-fg: #EAEFEA;
    --tool-tag-bg: #223029;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.2s ease, color 0.2s ease;
  }

  header {
    background: var(--teal-deep);
    color: #F6F4EF;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand h1 {
    font-size: 19px;
    margin: 0;
    letter-spacing: 0.2px;
    font-weight: 600;
  }

  .brand span {
    font-size: 12px;
    color: #B9CFC9;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 13px;
  }

  .controls input, .controls select {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--input-fg);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
  }

  .controls input::placeholder { color: #A9C4BE; }

  #themeToggle {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--input-fg);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    overflow: hidden;
    padding: 18px;
  }

  .chat-shell {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-radius: 18px;
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(27, 62, 57, 0.06);
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.agent { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
  }

  .row.user .bubble {
    background: var(--user-bubble);
    color: #FFFFFF;
    border-bottom-right-radius: 4px;
  }

  .row.agent .bubble {
    background: var(--agent-bubble);
    border: 1px solid var(--line);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  .conflict-card {
    max-width: 84%;
    border-radius: var(--radius);
    padding: 12px 16px;
    border: 1px solid var(--line);
    font-size: 13.5px;
  }

  .conflict-card.high { background: var(--high-bg); border-color: #EFC9C0; }
  .conflict-card.medium { background: var(--medium-bg); border-color: #F1DCB2; }

  .conflict-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .dot.high { background: var(--high); }
  .dot.medium { background: var(--medium); }

  .tool-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--tool-tag-bg);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 999px;
    margin-bottom: 8px;
  }

  .composer {
    border-top: 1px solid var(--line);
    padding: 8px 10px;
    display: flex;
    gap: 6px;
    align-items: flex-end;
    background: var(--panel);
  }

  .composer textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    max-height: 100px;
    outline: none;
    background: var(--panel);
    color: var(--ink);
  }
  .composer textarea:focus { border-color: var(--teal); }

  button.icon-btn, button.send-btn {
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }

  button.icon-btn {
    background: var(--tool-tag-bg);
    color: var(--ink);
    width: 38px;
    height: 38px;
    font-size: 18px;
  }

  button.send-btn {
    background: var(--teal);
    color: #fff;
    padding: 0 12px;
    height: 38px;
    font-weight: 600;
  }
  button.send-btn:hover { background: var(--teal-deep); }

  #fileInput { display: none; }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13.5px;
    max-width: 320px;
  }

  .empty-state strong { color: var(--ink); display:block; font-size: 15px; margin-bottom: 6px; }

  .upload-banner {
    font-size: 12.5px;
    color: var(--ink-soft);
    padding: 6px 16px 0 16px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #DCD7C9; border-radius: 8px; }
  html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #35473F; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>MediFlow</h1>
    <span>Care Companion</span>
  </div>
  <div class="controls">
    <input id="apiBase" placeholder="API URL" size="24" />
    <select id="patientSelect">
      <option value="">Loading patients...</option>
    </select>
    <button class="icon-btn" id="newPatientBtn" title="Register as a new patient" style="width:auto; padding:0 12px; height:34px; font-size:13px;">+ New patient</button>
    <button class="icon-btn" id="remindersBtn" title="Manage medication reminders" style="width:34px; height:34px; font-size:16px;">R</button>
    <button id="notifBell" title="Notifications" style="position:relative; background:var(--input-bg); border:1px solid var(--input-border); color:var(--input-fg); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px;">
      
      <span id="notifBadge" style="display:none; position:absolute; top:-4px; right:-4px; background:var(--high); color:#fff; font-size:10px; font-weight:700; border-radius:999px; min-width:16px; height:16px; padding:0 3px; align-items:center; justify-content:center; line-height:16px;">0</span>
    </button>
    <button id="themeToggle" title="Toggle dark mode"></button>
  </div>
</header>

<!-- NOTIFICATIONS PANEL -->
<div id="notifPanel" style="display:none; position:fixed; top:60px; right:20px; width:320px; max-height:420px; overflow-y:auto; background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:0 12px 32px rgba(0,0,0,0.18); z-index:20;">
  <div style="padding:12px 16px; border-bottom:1px solid var(--line); font-weight:600; font-size:14px; color:var(--ink);">Notifications</div>
  <div id="notifList" style="padding:8px;"></div>
</div>

<!-- REMINDERS PANEL -->
<div id="remindersModal" style="display:none; position:fixed; inset:0; background:rgba(27,62,57,0.35); align-items:center; justify-content:center; z-index:20;">
  <div style="background:var(--panel); border-radius:16px; padding:24px; width:360px; max-height:80vh; overflow-y:auto; box-shadow:0 12px 32px rgba(0,0,0,0.2);">
    <h3 style="margin:0 0 14px 0; font-size:16px; color:var(--ink);">Medication reminders</h3>
    <div id="reminderList" style="margin-bottom:16px;"></div>
    <div style="border-top:1px solid var(--line); padding-top:14px;">
      <div style="font-size:13px; font-weight:600; color:var(--ink); margin-bottom:8px;">Add a reminder</div>
      <select id="reminderMedSelect" style="width:100%; padding:9px 10px; margin-bottom:6px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);">
        <option value="">Loading medicines...</option>
      </select>
      <div style="text-align:center; font-size:11.5px; color:var(--ink-soft); margin-bottom:6px;"> or, if it's not listed above </div>
      <input id="reminderCustomNameInput" placeholder="Type medicine name manually (e.g. Vitamin D)" style="width:100%; padding:9px 10px; margin-bottom:8px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);" />
      <input id="reminderTimeInput" type="time" style="width:100%; padding:9px 10px; margin-bottom:8px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);" />
      <input id="reminderLabelInput" placeholder="Note (optional), e.g. with breakfast" style="width:100%; padding:9px 10px; margin-bottom:12px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);" />
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="closeRemindersBtn" style="background:var(--tool-tag-bg); color:var(--ink); border:none; border-radius:8px; padding:8px 14px; cursor:pointer;">Close</button>
        <button id="addReminderBtn" style="background:var(--teal); color:#fff; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-weight:600;">Add reminder</button>
      </div>
    </div>
  </div>
</div>

<div id="registerModal" style="display:none; position:fixed; inset:0; background:rgba(27,62,57,0.35); align-items:center; justify-content:center; z-index:10;">
  <div style="background:var(--panel); border-radius:16px; padding:24px; width:320px; box-shadow:0 12px 32px rgba(0,0,0,0.2);">
    <h3 style="margin:0 0 14px 0; font-size:16px; color:var(--ink);">Register as a new patient</h3>
    <input id="regName" placeholder="Full name" style="width:100%; padding:9px 10px; margin-bottom:8px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);" />
    <input id="regAge" placeholder="Age" type="number" style="width:100%; padding:9px 10px; margin-bottom:8px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);" />
    <select id="regLanguage" style="width:100%; padding:9px 10px; margin-bottom:14px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink);">
      <option value="english">English</option>
      <option value="hindi">Hindi</option>
      <option value="hinglish">Hinglish (WhatsApp-style mix)</option>
      <option value="punjabi">Punjabi</option>
    </select>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="cancelRegBtn" style="background:var(--tool-tag-bg); color:var(--ink); border:none; border-radius:8px; padding:8px 14px; cursor:pointer;">Cancel</button>
      <button id="submitRegBtn" style="background:var(--teal); color:#fff; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-weight:600;">Register</button>
    </div>
  </div>
</div>

<main>
  <div class="chat-shell">
    <div id="messages">
      <div class="empty-state">
        <strong>Ask me anything about your care</strong>
        Try: "what medicines am I on?" or "I have chest pain, who should I see?"  or upload a prescription below.
      </div>
    </div>
    <div class="upload-banner" id="uploadStatus"></div>
    <div class="composer">
      <button class="icon-btn" id="uploadBtn" title="Upload a document" aria-label="Upload a document">+</button>
      <input type="file" id="fileInput" accept="image/*" />
      <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>
</main>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const patientSelect = document.getElementById('patientSelect');
  const apiBaseInput = document.getElementById('apiBase');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const uploadStatus = document.getElementById('uploadStatus');
  const themeToggle = document.getElementById('themeToggle');

  const EMPTY_STATE_HTML = '<div class="empty-state"><strong>Ask me anything about your care</strong>Try: "what medicines am I on?" or "I have chest pain, who should I see?"  or upload a prescription below.</div>';

  let history = [];
  let currentPatientId = '';

  // ---------------- DARK MODE ----------------
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? 'Light' : 'Dark';
  }
  applyTheme(localStorage.getItem('mediflow-theme') || 'light');
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('mediflow-theme', next);
    applyTheme(next);
  });

  // If this page is served BY the backend itself (recommended  see deployment
  // notes), window.location.origin IS the API's URL, so it works automatically
  // wherever this gets deployed. If someone opens this HTML file directly on
  // their own computer (file://) instead, fall back to localhost:8000.
  apiBaseInput.value = (window.location.origin.startsWith('http'))
    ? window.location.origin
    : 'http://localhost:8000';

  function apiBase() {
    return apiBaseInput.value.replace(/\/$/, '');
  }

  // ---------------- FIX (Bug: switching patient kept old chat) ----------------
  // Root cause: patientSelect had NO change listener at all, so the chat
  // window and the in-memory `history` array never reset when a different
  // patient was picked from the dropdown. This now:
  //   1. Clears the on-screen messages and resets `history` to empty
  //   2. Fetches that patient's OWN history from the server (agent.py now
  //      always keeps server-side history keyed by patient_id) and renders it
  // so switching patients always shows a fresh, correct conversation.
  async function loadHistoryForPatient(patientId) {
    currentPatientId = patientId;
    history = [];
    messagesEl.innerHTML = '';
    uploadStatus.textContent = '';

    if (!patientId) {
      messagesEl.innerHTML = EMPTY_STATE_HTML;
      return;
    }

    try {
      const res = await fetch(apiBase() + '/agent/conversation/' + encodeURIComponent(patientId));
      if (res.ok) {
        const data = await res.json();
        const serverHistory = data.conversation_history || [];
        if (serverHistory.length === 0) {
          messagesEl.innerHTML = EMPTY_STATE_HTML;
        } else {
          serverHistory.forEach(m => {
            addBubble(m.role === 'user' ? 'user' : 'agent', m.content);
            history.push({ role: m.role, content: m.content });
          });
        }
      } else {
        messagesEl.innerHTML = EMPTY_STATE_HTML;
      }
    } catch (err) {
      messagesEl.innerHTML = EMPTY_STATE_HTML;
    }
  }

  patientSelect.addEventListener('change', () => {
    loadHistoryForPatient(patientSelect.value);
    seenNotificationIds = new Set();
    pollNotifications();
  });

  async function loadPatients(selectId) {
    try {
      const res = await fetch(apiBase() + '/agent/patients');
      const data = await res.json();
      patientSelect.innerHTML = '';
      if (!data.patients || data.patients.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'No patients yet  register one';
        patientSelect.appendChild(opt);
        await loadHistoryForPatient('');
        return;
      }
      data.patients.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.name}`;
        patientSelect.appendChild(opt);
      });
      const toSelect = selectId || patientSelect.value;
      patientSelect.value = toSelect;
      // Always (re)load the correct patient's own history on load/select 
      // this is what was missing before.
      await loadHistoryForPatient(patientSelect.value);
    } catch (err) {
      patientSelect.innerHTML = '<option value="">Could not load patients  check API URL</option>';
    }
  }

  loadPatients().then(() => pollNotifications());
  apiBaseInput.addEventListener('change', () => loadPatients());

  const registerModal = document.getElementById('registerModal');
  const newPatientBtn = document.getElementById('newPatientBtn');
  const cancelRegBtn = document.getElementById('cancelRegBtn');
  const submitRegBtn = document.getElementById('submitRegBtn');

  newPatientBtn.addEventListener('click', () => {
    registerModal.style.display = 'flex';
  });
  cancelRegBtn.addEventListener('click', () => {
    registerModal.style.display = 'none';
  });

  submitRegBtn.addEventListener('click', async () => {
    const name = document.getElementById('regName').value.trim();
    const age = document.getElementById('regAge').value;
    const language = document.getElementById('regLanguage').value;

    if (!name) {
      alert('Please enter a name.');
      return;
    }

    submitRegBtn.disabled = true;
    submitRegBtn.textContent = 'Registering...';

    try {
      const res = await fetch(apiBase() + '/agent/register-patient', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: name,
          age: age ? parseInt(age) : null,
          preferred_language: language
        })
      });
      const data = await res.json();

      if (!res.ok) {
        alert('Could not register: ' + (data.detail || 'unknown error'));
        return;
      }

      await loadPatients(data.patient_id);
      registerModal.style.display = 'none';
      document.getElementById('regName').value = '';
      document.getElementById('regAge').value = '';

    } catch (err) {
      alert('Could not reach the server. Check the API URL above.');
    } finally {
      submitRegBtn.disabled = false;
      submitRegBtn.textContent = 'Register';
    }
  });

  function clearEmptyState() {
    const empty = messagesEl.querySelector('.empty-state');
    if (empty) empty.remove();
  }

  function addBubble(role, text) {
    clearEmptyState();
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addConflictCards(conflicts) {
    if (!conflicts || conflicts.length === 0) return;
    clearEmptyState();
    conflicts.forEach(c => {
      const card = document.createElement('div');
      card.className = 'conflict-card ' + (c.severity || 'medium');
      const title = document.createElement('div');
      title.className = 'conflict-title';
      title.innerHTML = `<span class="dot ${c.severity || 'medium'}"></span> ${c.type.replace('_', ' ')}  ${(c.severity || 'medium').toUpperCase()} priority`;
      const msg = document.createElement('div');
      msg.textContent = c.message;
      card.appendChild(title);
      card.appendChild(msg);
      messagesEl.appendChild(card);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addToolTag(tools) {
    if (!tools || tools.length === 0) return;
    clearEmptyState();
    const tag = document.createElement('div');
    tag.className = 'tool-tag';
    tag.textContent = 'checked: ' + tools.map(t => t.tool).join(', ');
    messagesEl.appendChild(tag);
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    if (!currentPatientId) {
      addBubble('agent', 'Please select or register a patient first.');
      return;
    }

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    try {
      const res = await fetch(apiBase() + '/agent/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          patient_id: currentPatientId,
          message: text,
          conversation_history: history.slice(0, -1)
        })
      });
      const data = await res.json();

      if (!res.ok) {
        addBubble('agent', 'Something went wrong: ' + (data.error || data.detail || 'unknown error') + '\n\nPlease try sending that again.');
        return;
      }

      if (data.tool_calls_made && data.tool_calls_made.length) {
        addToolTag(data.tool_calls_made);
      }

      const conflictData = data.structured_data && data.structured_data.check_medication_conflicts;
      if (conflictData && conflictData.has_conflicts) {
        addConflictCards(conflictData.conflicts);
      }

      addBubble('agent', data.reply);
      history.push({ role: 'assistant', content: data.reply });

    } catch (err) {
      addBubble('agent', 'Could not reach the server. Make sure the API is running and the URL above is correct.');
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    if (!currentPatientId) {
      addBubble('agent', 'Please select or register a patient first.');
      fileInput.value = '';
      return;
    }

    uploadStatus.textContent = 'Uploading and reading ' + file.name + ' ...';
    clearEmptyState();

    const formData = new FormData();
    formData.append('patient_id', currentPatientId);
    formData.append('document_type', 'prescription');
    formData.append('file', file);

    try {
      const res = await fetch(apiBase() + '/agent/upload-document', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();

      if (!res.ok) {
        uploadStatus.textContent = '';
        addBubble('agent', 'Could not read that document: ' + (data.detail || 'unknown error'));
        return;
      }

      uploadStatus.textContent = '';
      const meds = (data.medications_added || []).map(m => `${m.name} (${m.dosage || 'dosage unclear'})`).join(', ');
      addBubble('agent', meds
        ? `I read your document and found: ${meds}. I've added this to your record  please double check it's correct.`
        : `I read your document but couldn't confidently extract medicine details. You may want to try a clearer photo.`);

    } catch (err) {
      uploadStatus.textContent = '';
      addBubble('agent', 'Could not reach the server while uploading. Please try again.');
    } finally {
      fileInput.value = '';
    }
  });

  // ==================== NOTIFICATIONS ====================
  const notifBell = document.getElementById('notifBell');
  const notifBadge = document.getElementById('notifBadge');
  const notifPanel = document.getElementById('notifPanel');
  const notifList = document.getElementById('notifList');

  let seenNotificationIds = new Set();

  // Ask permission once so we can show real OS/browser popups, not just the in-app badge.
  if (window.Notification && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  function renderNotifications(list) {
    notifList.innerHTML = '';
    if (!list.length) {
      notifList.innerHTML = '<div style="padding:10px; color:var(--ink-soft); font-size:13px;">No notifications yet.</div>';
      return;
    }
    list.forEach(n => {
      const item = document.createElement('div');
      item.style.cssText = 'padding:10px 10px; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink); cursor:pointer;' + (n.is_read ? ' opacity:0.55;' : ' font-weight:600;');
      item.textContent = n.message;
      item.title = new Date(n.created_at).toLocaleString();
      item.addEventListener('click', async () => {
        if (!n.is_read) {
          await fetch(apiBase() + '/agent/notifications/' + n.id + '/read?patient_id=' + encodeURIComponent(currentPatientId), { method: 'POST' });
          pollNotifications();
        }
      });
      notifList.appendChild(item);
    });
  }

  async function pollNotifications() {
    if (!currentPatientId) return;
    try {
      const res = await fetch(apiBase() + '/agent/notifications/' + encodeURIComponent(currentPatientId));
      if (!res.ok) return;
      const data = await res.json();

      // Fire a browser popup for any notification we haven't shown before.
      (data.notifications || []).forEach(n => {
        if (!n.is_read && !seenNotificationIds.has(n.id)) {
          seenNotificationIds.add(n.id);
          if (window.Notification && Notification.permission === 'granted') {
            new Notification('MediFlow reminder', { body: n.message });
          }
        }
      });

      if (data.unread_count > 0) {
        notifBadge.style.display = 'flex';
        notifBadge.textContent = data.unread_count > 9 ? '9+' : data.unread_count;
      } else {
        notifBadge.style.display = 'none';
      }

      renderNotifications(data.notifications || []);
    } catch (err) {
      // Silent  polling failures shouldn't interrupt the chat experience.
    }
  }

  notifBell.addEventListener('click', () => {
    notifPanel.style.display = notifPanel.style.display === 'none' ? 'block' : 'none';
  });

  // Poll every 20 seconds while the page is open.
  setInterval(pollNotifications, 20000);

  // ==================== REMINDERS ====================
  const remindersBtn = document.getElementById('remindersBtn');
  const remindersModal = document.getElementById('remindersModal');
  const closeRemindersBtn = document.getElementById('closeRemindersBtn');
  const addReminderBtn = document.getElementById('addReminderBtn');
  const reminderList = document.getElementById('reminderList');
  const reminderMedSelect = document.getElementById('reminderMedSelect');
  const reminderCustomNameInput = document.getElementById('reminderCustomNameInput');
  const reminderTimeInput = document.getElementById('reminderTimeInput');
  const reminderLabelInput = document.getElementById('reminderLabelInput');

  async function refreshReminderPanel() {
    if (!currentPatientId) return;
    try {
      const res = await fetch(apiBase() + '/agent/reminders/' + encodeURIComponent(currentPatientId));
      const data = await res.json();
      const list = data.reminders || [];

      reminderList.innerHTML = '';
      if (!list.length) {
        reminderList.innerHTML = '<div style="color:var(--ink-soft); font-size:13px; margin-bottom:8px;">No reminders set yet.</div>';
      } else {
        list.forEach(r => {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink);';
          const label = document.createElement('span');
          label.textContent = `${r.medication_name}  ${r.reminder_time}${r.label ? ' (' + r.label + ')' : ''}`;
          const delBtn = document.createElement('button');
          delBtn.textContent = 'Remove';
          delBtn.style.cssText = 'background:none; border:none; color:var(--high); cursor:pointer; font-size:12px;';
          delBtn.addEventListener('click', async () => {
            await fetch(apiBase() + '/agent/reminders/' + r.id + '?patient_id=' + encodeURIComponent(currentPatientId), { method: 'DELETE' });
            refreshReminderPanel();
          });
          row.appendChild(label);
          row.appendChild(delBtn);
          reminderList.appendChild(row);
        });
      }

      await populateMedicineDropdown();
    } catch (err) {
      reminderList.innerHTML = '<div style="color:var(--ink-soft); font-size:13px;">Could not load reminders.</div>';
    }
  }

  async function populateMedicineDropdown() {
    reminderMedSelect.innerHTML = '<option value="">Loading medicines...</option>';
    try {
      const res = await fetch(apiBase() + '/agent/medications/' + encodeURIComponent(currentPatientId));
      const data = await res.json();
      const meds = data.medications || [];

      if (!meds.length) {
        reminderMedSelect.innerHTML = '<option value="">No medicines on file  type the name below instead</option>';
        return;
      }

      reminderMedSelect.innerHTML = '';
      meds.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.dosage ? `${m.name} (${m.dosage})` : m.name;
        reminderMedSelect.appendChild(opt);
      });
    } catch (err) {
      reminderMedSelect.innerHTML = '<option value="">Could not load medicines</option>';
    }
  }

  remindersBtn.addEventListener('click', () => {
    if (!currentPatientId) {
      addBubble('agent', 'Please select or register a patient first.');
      return;
    }
    remindersModal.style.display = 'flex';
    refreshReminderPanel();
  });
  closeRemindersBtn.addEventListener('click', () => {
    remindersModal.style.display = 'none';
  });

  addReminderBtn.addEventListener('click', async () => {
    const medicationId = reminderMedSelect.value;
    const customName = reminderCustomNameInput.value.trim();
    const time = reminderTimeInput.value;
    const label = reminderLabelInput.value.trim();

    if (!medicationId && !customName) {
      alert('Please pick a medicine from the list, or type its name manually.');
      return;
    }
    if (!time) {
      alert('Please pick a time.');
      return;
    }

    const payload = {
      patient_id: currentPatientId,
      reminder_time: time,
      label: label || null,
    };
    // Custom typed name takes priority if both are somehow filled in.
    if (customName) {
      payload.medicine_name = customName;
    } else {
      payload.medication_id = medicationId;
    }

    try {
      const res = await fetch(apiBase() + '/agent/reminders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        alert('Could not add reminder: ' + (data.error || data.detail || 'unknown error'));
        return;
      }
      reminderTimeInput.value = '';
      reminderLabelInput.value = '';
      reminderCustomNameInput.value = '';
      refreshReminderPanel();
    } catch (err) {
      alert('Could not reach the server.');
    }
  });
</script>

  <script src="voice-feature-safe.js" defer></script>
</body>
</html>
